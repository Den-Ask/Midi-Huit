<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Midi-Nuit – Prototype</title>
<style>
body { font-family: sans-serif; background:#eee; }
#ui { width:520px; margin:auto; text-align:center; }
#board {
  display:grid;
  grid-template-columns: repeat(8, 60px);
  grid-template-rows: repeat(8, 60px);
  gap:2px;
  margin:20px auto;
}
.cell {
  width:60px; height:60px;
  display:flex; align-items:center; justify-content:center;
  background:#ccc; cursor:pointer; font-size:24px;
}
.cell.dark { background:#aaa; }
.p1 { color:blue; }
.p2 { color:red; }
.selected { outline:3px solid gold; }
button {
    width: 30;
    height: 30;
    background-color: grey;
    
}
</style>
</head>
<body>

<div id="ui">
  <div id="status"></div>
  <div id="piècesR"></div>
  <div id="board"></div>
  <div id="piècesB"></div>
  <button onclick="initialisation()">HH</button>
</div>

<script>
const SIZE = 8;
const MAX_M = 10;

const TYPES = {
  A:{s:"✦"}, D:{s:"■"}, T:{s:"▲"}, C:{s:"●"}
};

let board = [...Array(SIZE)].map(()=>Array(SIZE).fill(null));

let players = {
  1:{m:1}, 2:{m:0}
};

let current = 1;
let selected = null;
let actionDone = false;

document.querySelector("button").addEventListener(click, initialisation());

// placement initial minimal
function initialisation () {
    for(let y=0;y<8;y++)for(let x=0;x<8;x++){
        board [x] [y] = null;
    };
    board[7][0] = { p: 1, t: "T" };
    board[7][1] = { p: 1, t: "T" };
    board[7][2] = { p: 1, t: "D" };
    board[7][4] = { p: 1, t: "C" };
    board[7][5] = { p: 1, t: "D" };
    board[7][6] = { p: 1, t: "A" };
    board[7][7] = { p: 1, t: "A" };
    board[0][0] = { p: 2, t: "T" };
    board[0][1] = { p: 2, t: "T" };
    board[0][2] = { p: 2, t: "D" };
    board[0][4] = { p: 2, t: "C" };
    board[0][5] = { p: 2, t: "D" };
    board[0][6] = { p: 2, t: "A" };
    board[0][7] = { p: 2, t: "A" };
    players [1].m = 1;
    players [2].m = 0;
    current = 1;
    render();
};

function superior(a,d){
  if(d==="C" && a!=="C") return 1;
  if(a==="C" && d!=="C") return -1;
  if(a===d) return 0;
  if((a==="A"&&d==="T")||(a==="T"&&d==="D")||(a==="D"&&d==="A")) return 1;
  return -1;
}

function inBounds(x,y){ return x>=0&&x<8&&y>=0&&y<8; }

function moves(x,y){
  let p=board[y][x]; if(!p) return [];
  let res=[];
  for(let dx=-1;dx<=1;dx++)
    for(let dy=-1;dy<=1;dy++)
      if(dx||dy) res.push([x+dx,y+dy]);

  if(p.t==="A"){
    let dir=p.p===1?-1:1;
    res.push([x+2,y+2*dir],[x-2,y+2*dir]);
  }
  if(p.t==="D"){
    let dir=p.p===1?1:-1;
    for(let i=1;i<=3;i++) res.push([x,y+i*dir]);
  }
  if(p.t==="T"){
    let dir=p.p===1?-1:1;
    for(let i=1;i<=3;i++) res.push([x,y+i*dir]);
  }
  return res.filter(m=>inBounds(m[0],m[1]));
}

function render(){
  document.getElementById("status").textContent =
    `Joueur ${current} – Mpesa: ${players[current].m}`;
  let b=document.getElementById("board");
  b.innerHTML="";
  for(let y=0;y<8;y++)for(let x=0;x<8;x++){
    let c=document.createElement("div");
    c.className="cell"+((x+y)%2?" dark":"");
    let p=board[y][x];
    if(p){ c.textContent=TYPES[p.t].s; c.classList.add("p"+p.p); }
    if(selected&&selected.x===x&&selected.y===y) c.classList.add("selected");
    c.onclick=()=>click(x,y);
    b.appendChild(c);
  }
}

function click(x,y){
  if(actionDone) return;
  let p=board[y][x];

  if(selected){
    let from=selected;
    let valid=moves(from.x,from.y)
      .some(m=>m[0]===x&&m[1]===y);
    if(!valid){ selected=null; render(); return; }

    if(p&&p.p===current){ selected={x,y}; render(); return; }

    if(p){
      let r=superior(board[from.y][from.x].t,p.t);
      if(r>=0) board[y][x]=board[from.y][from.x];
      if(r===0) board[y][x]=null;
      board[from.y][from.x]=null;
    } else {
      board[y][x]=board[from.y][from.x];
      board[from.y][from.x]=null;
    }

    endTurn();
    return;
  }

  if(p&&p.p===current) selected={x,y};
  render();
}

function endTurn(){
  selected=null;
  actionDone=true;
  current=current===1?2:1;
  players[current].m=Math.min(MAX_M,players[current].m+1);
  actionDone=false;
  render();
}

function adjacent(x, y) {
  let res = [];
  for (let dx = -1; dx <= 1; dx++)
    for (let dy = -1; dy <= 1; dy++)
      if (dx || dy)
        if (inBounds(x + dx, y + dy))
          res.push([x + dx, y + dy]);
  return res;
}

initialisation();
render();
</script>

</body>
</html>
